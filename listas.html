<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas ordenadas e não ordenadas</title>
</head>

<body>
    
    <!--
        ul - Unordered List
        ol - Ordered List
        li - List item
    -->

    <h2>Lista não ordenada (menus)</h2>

    <!--
    type = "disc" circle, square, dics
    style = "list-style-type:circle"
    -->

    <ul style="list-style-type:circle">
        <li>Veículos</li>
        <li>Motos</li>
        <li>
            Tecnologia
            <ul>
                <li>Celulares e telefones</li>
                <li>Câmeras e acessórios
                </li>
            </ul>
        </li>
    </ul>

    <h2>Lista ordenada (lista de compras)</h2>

    <!--
    type= "1", 1, a, A, i, I
    style = "list-style-type: upper-roman;"
    -->

    <ol style="list-style-type: upper-roman;">
        <li>Melancia</li>
        <li>Molho de tomate</li>
        <li>Macarrão</li>
        <li>Geleia
            <ol>
                <li>Morango</li>
                <li>Framboesa</li>
            </ol>
        </li>
    </ol>



</body>

</html>
