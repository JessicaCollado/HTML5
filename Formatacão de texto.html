<!DOCTYPE html>
<html lang="pr-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de textos</title>
</head>

<body>
    
    <!--
    <b> bold - negrito
    <strong> - forte, texto com importância
    <em> (ênfase) - coloca enfase no texto
    <mark> (marca) - representa o texto marcado
    -->

    <h2>Formatações de textos</h2>
    Esse é um texto <b>negrito</b><br>
    Esse é um texto <strong>importante</strong><br>
    Esse é um texto <i>itálico</i><br>
    Esse é um texto <em>ênfase</em><br>
    Esse é um texto <mark>marcado</mark><br>

    <!--
    <u> underline - texto sublinhado
    <del> deleted - texto com marcação de apagado
    -->

    Esse é um texto <u>sublinhado</u><br>
    Esse é um texto <del>itálico</del><br>

    <!--
    <sup> (supercript text - sobrescrito)
    <sub> (Subscirpt text - subscrito)
    -->

    <h2>Diferentes tipos de caracteres</h2>

    Sobrescrito: 10<sup>2</sup><br>
    Subscritos: H<sub>2</sub>O <br>

</body>

</html>
